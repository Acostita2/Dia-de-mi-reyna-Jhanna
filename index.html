<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
overflow:hidden;
}

/* SOBRE */

.sobre{
position:relative;
width:340px;
height:220px;
background:#ff4d6d;
cursor:pointer;
transition:.5s;
}

.sobre:before{
content:'';
position:absolute;
top:-110px;
left:0;
border-left:170px solid transparent;
border-right:170px solid transparent;
border-bottom:110px solid #ff4d6d;
transition:.6s;
}

.sobre.abierto:before{
transform:rotateX(180deg);
}

/* CARTA */

.carta{
position:absolute;
background:white;
width:320px;
height:460px;
top:20px;
left:10px;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transform:translateY(60px);
transition:.8s;
padding:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.sobre.abierto .carta{
opacity:1;
transform:translateY(-170px);
}

/* FOTO GRANDE */

.foto{
width:100%;
max-width:320px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TEXTO TE AMO */

.teamo{
font-size:45px;
color:#ff2e63;
margin-top:15px;
animation:latido 1s infinite;
font-weight:bold;
text-shadow:0 0 15px rgba(255,0,100,.7);
}

/* ANIMACION LATIDO */

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<div class="sobre" onclick="abrirCarta()">

<div class="carta">

<img src="foto.jpg" class="foto">

<div class="teamo">
Te amo ❤️
</div>

</div>

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function abrirCarta(){
document.querySelector(".sobre").classList.toggle("abierto");
document.getElementById("musica").play();
}

</script>

</body>
</html>
